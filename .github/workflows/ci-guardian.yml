name: CI Guardian

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  guardian:
    name: Scan & Auto-Fix CI Failures
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run CI Guardian
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          CLAUDE_SESSION_KEY: ${{ secrets.CLAUDE_SESSION_KEY }}
        run: bash scripts/ci_guardian.sh
