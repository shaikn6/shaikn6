<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#92400e"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4b5563"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="480" fill="url(#bg)" rx="12"/>
  <rect width="900" height="480" fill="none" stroke="#21262d" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#f0f6fc" font-size="13" font-weight="600" letter-spacing="2" opacity="0.7">PRODUCTION LLM STACK</text>

  <!-- ── Row 1: Data Sources ── -->
  <text x="450" y="62" text-anchor="middle" fill="#6e7681" font-size="10" letter-spacing="1">DATA SOURCES</text>

  <!-- Kafka -->
  <rect x="60" y="70" width="110" height="44" rx="8" fill="url(#orange)" stroke="#d97706" stroke-width="1"/>
  <text x="115" y="89" text-anchor="middle" fill="#fef3c7" font-size="11" font-weight="600">Apache Kafka</text>
  <text x="115" y="104" text-anchor="middle" fill="#fcd34d" font-size="9" opacity="0.8">kafka-stream-feature-store</text>

  <!-- dbt / Spark -->
  <rect x="200" y="70" width="110" height="44" rx="8" fill="url(#orange)" stroke="#d97706" stroke-width="1"/>
  <text x="255" y="89" text-anchor="middle" fill="#fef3c7" font-size="11" font-weight="600">Spark + dbt</text>
  <text x="255" y="104" text-anchor="middle" fill="#fcd34d" font-size="9" opacity="0.8">distributed-etl-ecommerce</text>

  <!-- Postgres -->
  <rect x="340" y="70" width="110" height="44" rx="8" fill="url(#orange)" stroke="#d97706" stroke-width="1"/>
  <text x="395" y="89" text-anchor="middle" fill="#fef3c7" font-size="11" font-weight="600">PostgreSQL</text>
  <text x="395" y="104" text-anchor="middle" fill="#fcd34d" font-size="9" opacity="0.8">data-lakehouse-delta</text>

  <!-- ── Row 2: Feature Store + Governance ── -->
  <text x="450" y="148" text-anchor="middle" fill="#6e7681" font-size="10" letter-spacing="1">FEATURE STORE &amp; GOVERNANCE</text>

  <!-- Feast -->
  <rect x="130" y="156" width="130" height="44" rx="8" fill="url(#teal)" stroke="#0891b2" stroke-width="1"/>
  <text x="195" y="175" text-anchor="middle" fill="#e0f2fe" font-size="11" font-weight="600">Feast Feature Store</text>
  <text x="195" y="190" text-anchor="middle" fill="#7dd3fc" font-size="9" opacity="0.8">mlops-feature-platform</text>

  <!-- Model Governance -->
  <rect x="290" y="156" width="130" height="44" rx="8" fill="url(#teal)" stroke="#0891b2" stroke-width="1"/>
  <text x="355" y="175" text-anchor="middle" fill="#e0f2fe" font-size="11" font-weight="600">Model Governance</text>
  <text x="355" y="190" text-anchor="middle" fill="#7dd3fc" font-size="9" opacity="0.8">financial-model-governance</text>

  <!-- MLflow -->
  <rect x="450" y="156" width="130" height="44" rx="8" fill="url(#teal)" stroke="#0891b2" stroke-width="1"/>
  <text x="515" y="175" text-anchor="middle" fill="#e0f2fe" font-size="11" font-weight="600">MLflow Registry</text>
  <text x="515" y="190" text-anchor="middle" fill="#7dd3fc" font-size="9" opacity="0.8">llmops-eval-platform</text>

  <!-- ── Row 3: LLM Gateway (centre) ── -->
  <text x="450" y="234" text-anchor="middle" fill="#6e7681" font-size="10" letter-spacing="1">LLM GATEWAY</text>

  <rect x="310" y="242" width="220" height="52" rx="10" fill="url(#purple)" stroke="#7c3aed" stroke-width="1.5" filter="url(#glow)"/>
  <text x="420" y="264" text-anchor="middle" fill="#ede9fe" font-size="13" font-weight="700">LLM Gateway</text>
  <text x="420" y="281" text-anchor="middle" fill="#c4b5fd" font-size="9" opacity="0.9">llm-gateway · nano-finbert · llm-safety-auditor</text>

  <!-- ── Row 4: Agents ── -->
  <text x="450" y="324" text-anchor="middle" fill="#6e7681" font-size="10" letter-spacing="1">AGENT LAYER</text>

  <rect x="55" y="332" width="145" height="44" rx="8" fill="url(#blue)" stroke="#3b82f6" stroke-width="1"/>
  <text x="127" y="351" text-anchor="middle" fill="#dbeafe" font-size="11" font-weight="600">Coding Agent</text>
  <text x="127" y="366" text-anchor="middle" fill="#93c5fd" font-size="9" opacity="0.8">autonomous-coding-agent</text>

  <rect x="222" y="332" width="145" height="44" rx="8" fill="url(#blue)" stroke="#3b82f6" stroke-width="1"/>
  <text x="294" y="351" text-anchor="middle" fill="#dbeafe" font-size="11" font-weight="600">Research Crew</text>
  <text x="294" y="366" text-anchor="middle" fill="#93c5fd" font-size="9" opacity="0.8">multi-agent-research-crew</text>

  <rect x="389" y="332" width="145" height="44" rx="8" fill="url(#blue)" stroke="#3b82f6" stroke-width="1"/>
  <text x="461" y="351" text-anchor="middle" fill="#dbeafe" font-size="11" font-weight="600">Finance Crew</text>
  <text x="461" y="366" text-anchor="middle" fill="#93c5fd" font-size="9" opacity="0.8">finance-agent-crew</text>

  <rect x="556" y="332" width="145" height="44" rx="8" fill="url(#blue)" stroke="#3b82f6" stroke-width="1"/>
  <text x="628" y="351" text-anchor="middle" fill="#dbeafe" font-size="11" font-weight="600">SRE Autopilot</text>
  <text x="628" y="366" text-anchor="middle" fill="#93c5fd" font-size="9" opacity="0.8">ops-autopilot · agentic-pipeline-healer</text>

  <!-- ── Row 5: Monitoring ── -->
  <text x="450" y="410" text-anchor="middle" fill="#6e7681" font-size="10" letter-spacing="1">OBSERVABILITY</text>

  <rect x="130" y="418" width="175" height="44" rx="8" fill="url(#green)" stroke="#10b981" stroke-width="1"/>
  <text x="217" y="437" text-anchor="middle" fill="#d1fae5" font-size="11" font-weight="600">LLM Sentinel</text>
  <text x="217" y="452" text-anchor="middle" fill="#6ee7b7" font-size="9" opacity="0.8">evidently-llm-sentinel · ml-drift-monitoring</text>

  <rect x="335" y="418" width="175" height="44" rx="8" fill="url(#green)" stroke="#10b981" stroke-width="1"/>
  <text x="422" y="437" text-anchor="middle" fill="#d1fae5" font-size="11" font-weight="600">AIOps Intelligence</text>
  <text x="422" y="452" text-anchor="middle" fill="#6ee7b7" font-size="9" opacity="0.8">aiops-incident-intelligence · observability-copilot</text>

  <rect x="540" y="418" width="175" height="44" rx="8" fill="url(#green)" stroke="#10b981" stroke-width="1"/>
  <text x="627" y="437" text-anchor="middle" fill="#d1fae5" font-size="11" font-weight="600">DevSecOps Pipeline</text>
  <text x="627" y="452" text-anchor="middle" fill="#6ee7b7" font-size="9" opacity="0.8">fintech-devsecops-pipeline · k8s-platform-engineering</text>

  <!-- ── Arrows: Data → Feature Store ── -->
  <line x1="115" y1="114" x2="175" y2="154" stroke="#4b5563" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="255" y1="114" x2="240" y2="154" stroke="#4b5563" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="340" y1="92" x2="310" y2="92" stroke="#4b5563" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="395" y1="114" x2="375" y2="154" stroke="#4b5563" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Feature Store → Gateway -->
  <line x1="260" y1="200" x2="345" y2="240" stroke="#4b5563" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="420" y1="200" x2="420" y2="240" stroke="#4b5563" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="515" y1="200" x2="490" y2="240" stroke="#4b5563" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Gateway → Agents -->
  <line x1="370" y1="294" x2="190" y2="330" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)" opacity="0.7"/>
  <line x1="400" y1="294" x2="330" y2="330" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)" opacity="0.7"/>
  <line x1="440" y1="294" x2="450" y2="330" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)" opacity="0.7"/>
  <line x1="470" y1="294" x2="590" y2="330" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)" opacity="0.7"/>

  <!-- Agents → Monitoring -->
  <line x1="127" y1="376" x2="190" y2="416" stroke="#4b5563" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="461" y1="376" x2="400" y2="416" stroke="#4b5563" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="628" y1="376" x2="628" y2="416" stroke="#4b5563" stroke-width="1" stroke-dasharray="3,2"/>
</svg>